name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'
      run: npm install
      
    - name: Run tests
      env:
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || '1972' }}
        PUPPETEER_SKIP_DOWNLOAD: 'true'
      run: |
        # Use pre-installed Chromium in Ubuntu
        export PUPPETEER_EXECUTABLE_PATH=$(which chromium-browser || which chromium || which google-chrome-stable || echo '')
        npm test
